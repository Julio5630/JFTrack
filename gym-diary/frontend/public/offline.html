<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#004d40" />
    <title>JFTrack offline</title>
    <style>
      * { box-sizing: border-box; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; color: #16332d; background: radial-gradient(circle at 88% 8%,#ccefdc 0,transparent 28%),linear-gradient(160deg,#f8faf9,#e9f1ee); font-family: Georgia,serif; }
      main { width: min(460px,100%); padding: 34px; border-radius: 28px; background: rgba(255,255,255,.92); box-shadow: 0 24px 65px rgba(0,77,64,.14); }
      img { width: 64px; height: 64px; border-radius: 18px; }
      h1 { margin: 22px 0 10px; color: #003d33; font-size: 2rem; }
      p { margin: 0; color: #60716c; font: 1rem/1.6 sans-serif; }
      button { width: 100%; min-height: 50px; margin-top: 25px; border: 0; border-radius: 15px; color: white; background: #004d40; font-weight: 800; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <img src="/pwa-192.png" alt="" />
      <h1>Você está offline</h1>
      <p>O JFTrack precisa de conexão para entrar na conta e sincronizar treinos, avaliações e progresso.</p>
      <button type="button" onclick="location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
