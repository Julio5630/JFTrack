<!DOCTYPE html>
<html>
<head>
<title>Copy of Lotérica &quot;Casa da Sorte&quot;</title>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
  :root {
    --bg: #f4f7f4;
    --panel: rgba(255, 255, 255, 0.94);
    --panel-strong: #ffffff;
    --text: #16342d;
    --muted: #61746e;
    --accent: #0f6a58;
    --accent-soft: #def2ea;
    --border: rgba(16, 52, 44, 0.08);
    --shadow: 0 18px 46px rgba(13, 60, 51, 0.10);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Inter", "Segoe UI", Arial, sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(177, 233, 214, 0.40), transparent 28%),
      radial-gradient(circle at right 20%, rgba(228, 244, 237, 0.78), transparent 30%),
      linear-gradient(180deg, #fbfcfb 0%, var(--bg) 100%);
  }

  .page-shell {
    width: min(1520px, calc(100% - 32px));
    margin: 0 auto;
    padding: 28px 0 40px;
  }

  .hero {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 24px;
    padding: 28px 30px;
    border: 1px solid var(--border);
    border-radius: 28px;
    background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(246, 250, 248, 0.95));
    box-shadow: var(--shadow);
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .hero-copy {
    max-width: 780px;
  }

  .hero h1 {
    margin: 16px 0 10px;
    font-size: clamp(2rem, 4vw, 3rem);
    line-height: 1;
    letter-spacing: -0.04em;
  }

  .hero p {
    margin: 0;
    color: var(--muted);
    line-height: 1.65;
    font-size: 1rem;
  }

  .hero-badge {
    min-width: 180px;
    padding: 18px;
    border: 1px solid rgba(15, 106, 88, 0.12);
    border-radius: 22px;
    background: var(--panel-strong);
    box-shadow: 0 10px 24px rgba(13, 60, 51, 0.08);
  }

  .hero-badge strong,
  .hero-badge span {
    display: block;
  }

  .hero-badge strong {
    color: var(--accent);
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .hero-badge span {
    margin-top: 8px;
    color: var(--text);
    line-height: 1.45;
  }

  .diagram-card {
    overflow: hidden;
    border: 1px solid var(--border);
    border-radius: 30px;
    background: var(--panel);
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
  }

  .diagram-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 16px 22px;
    border-bottom: 1px solid var(--border);
    background: rgba(247, 250, 248, 0.94);
  }

  .diagram-toolbar strong {
    font-size: 1rem;
  }

  .diagram-toolbar span {
    color: var(--muted);
    font-size: 0.9rem;
  }

  .diagram-stage {
    padding: 18px;
    background: linear-gradient(180deg, rgba(250, 252, 251, 0.98), rgba(242, 247, 244, 0.98));
  }

  .mxgraph {
    width: 100%;
    min-height: 74vh;
    border: 0 !important;
    border-radius: 22px;
    background: #ffffff;
    box-shadow: inset 0 0 0 1px rgba(18, 52, 45, 0.06);
  }

  @media (max-width: 900px) {
    .hero {
      flex-direction: column;
      padding: 24px 22px;
    }

    .hero-badge {
      width: 100%;
      min-width: 0;
    }
  }

  @media (max-width: 640px) {
    .page-shell {
      width: min(100% - 18px, 1520px);
      padding: 16px 0 24px;
    }

    .hero,
    .diagram-card {
      border-radius: 24px;
    }

    .diagram-toolbar {
      flex-direction: column;
      align-items: flex-start;
      padding: 14px 16px;
    }

    .diagram-stage {
      padding: 10px;
    }

    .mxgraph {
      min-height: 68vh;
      border-radius: 18px;
    }
  }
</style>
</head>

<script>
  (function () {
    const graph = document.querySelector('.mxgraph');

    if (!graph) {
      return;
    }

    const shell = document.createElement('div');
    shell.className = 'page-shell';

    const hero = document.createElement('section');
    hero.className = 'hero';
    hero.innerHTML = `
      <div class="hero-copy">
        <span class="eyebrow">Fluxograma do Sistema</span>
        <h1>JFTrack</h1>
        <p>Visualizacao do fluxo funcional do projeto.</p>
      </div>
    
    `;

    const card = document.createElement('section');
    card.className = 'diagram-card';
    card.innerHTML = `
      <div class="diagram-toolbar">
        <strong>diagrama</strong>
        <span>Use zoom, paginas e lightbox diretamente nos controles do viewer.</span>
      </div>
      <div class="diagram-stage"></div>
    `;

    const stage = card.querySelector('.diagram-stage');
    graph.parentNode.insertBefore(shell, graph);
    shell.appendChild(hero);
    shell.appendChild(card);
    stage.appendChild(graph);

    const rawConfig = graph.getAttribute('data-mxgraph');

    if (!rawConfig) {
      return;
    }

    try {
      const config = JSON.parse(rawConfig);
      config['dark-mode'] = '0';
      graph.setAttribute('data-mxgraph', JSON.stringify(config));
    } catch (error) {
      console.warn('Nao foi possivel ajustar o tema do viewer.', error);
    }
  })();
</script>
